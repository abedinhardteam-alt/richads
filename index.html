<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Earn Ads - Mini App</title>

<!-- ================= TELEGRAM WEB APP SDK (আবশ্যক) ================= -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ================= RICHADS SDK (এখানে নিজের কোড বসাবে) =================
  RichAds এ Publisher হিসেবে সাইন আপ করার পর ওরা তোমাকে একটা personalized
  JS ট্যাগ দিবে যেখানে থাকবে তোমার Publisher ID এবং Widget ID।
  নিচের লাইনে সেই আসল কোডটা বসিয়ে দিবে (এই লাইনটা শুধু placeholder/example):
====================================================================== -->
<script src="https://richads-example.com/sdk.js?pubId=YOUR_PUBLISHER_ID&widgetId=YOUR_WIDGET_ID" async></script>

<style>
  :root{
    --bg:#0f1115;
    --card:#181b22;
    --accent:#4da3ff;
    --accent2:#22c55e;
    --text:#f2f2f2;
    --muted:#9aa0a6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }
  h1{font-size:20px;margin:10px 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px;}
  .card{
    background:var(--card);
    width:100%;
    max-width:420px;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
  }
  .balance-label{color:var(--muted);font-size:13px;}
  .balance{
    font-size:36px;
    font-weight:700;
    color:var(--accent2);
    margin:4px 0 0;
  }
  .btn{
    width:100%;
    max-width:420px;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:12px;
    transition:transform .1s ease, opacity .2s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:#232733;color:var(--text);}
  .stats{
    display:flex;
    justify-content:space-between;
    width:100%;
    max-width:420px;
    margin-bottom:16px;
  }
  .stat{
    flex:1;
    background:var(--card);
    margin:0 4px;
    border-radius:12px;
    padding:12px;
    text-align:center;
  }
  .stat .num{font-size:18px;font-weight:700;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .status{
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    margin-top:4px;
    text-align:center;
  }
  .footer{
    margin-top:24px;
    font-size:11px;
    color:var(--muted);
    text-align:center;
  }
  .cooldown{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
    text-align:center;
  }
</style>
</head>
<body>

  <h1>🎬 Watch &amp; Earn</h1>
  <p class="sub">প্রতিটা ভিডিও অ্যাড দেখে কয়েন জমাও</p>

  <div class="card">
    <div class="balance-label">তোমার ব্যালেন্স</div>
    <div class="balance" id="balance">0.00</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="num" id="adsWatched">0</div>
      <div class="lbl">Ads দেখা হয়েছে</div>
    </div>
    <div class="stat">
      <div class="num" id="todayCount">0</div>
      <div class="lbl">আজকের Ads</div>
    </div>
  </div>

  <button class="btn btn-primary" id="watchBtn" onclick="watchAd()">
    ▶️ Video Ad দেখো (+0.01 coin)
  </button>

  <button class="btn btn-secondary" onclick="withdraw()">
    💸 Withdraw Request
  </button>

  <div class="status" id="status"></div>
  <div class="cooldown" id="cooldown"></div>

  <div class="footer">Powered by RichAds • Telegram Mini App</div>

<script>
  // ---------------- TELEGRAM INIT ----------------
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }
  const userId = tg?.initDataUnsafe?.user?.id || "guest";

  // ---------------- STATE (LocalStorage দিয়ে সেভ, backend চাইলে API তে replace করবে) ----------------
  const REWARD_PER_AD   = 0.01;   // প্রতি ad দেখলে কত coin পাবে (নিজের ইচ্ছামতো বদলাও)
  const COOLDOWN_MS     = 30000;  // দুই ad এর মাঝে ৩০ সেকেন্ড gap (spam/fraud আটকাতে সাহায্য করে)
  const DAILY_LIMIT     = 50;     // দিনে সর্বোচ্চ কয়টা ad দেখা যাবে

  const key = (k)=>`ads_app_${userId}_${k}`;
  let balance     = parseFloat(localStorage.getItem(key('balance')) || "0");
  let adsWatched  = parseInt(localStorage.getItem(key('adsWatched')) || "0");
  let lastAdTime  = parseInt(localStorage.getItem(key('lastAdTime')) || "0");
  let todayKey    = new Date().toISOString().slice(0,10);
  let todayData   = JSON.parse(localStorage.getItem(key('today')) || '{"date":"","count":0}');
  if (todayData.date !== todayKey){ todayData = {date: todayKey, count:0}; }

  function render(){
    document.getElementById('balance').innerText = balance.toFixed(2);
    document.getElementById('adsWatched').innerText = adsWatched;
    document.getElementById('todayCount').innerText = todayData.count;
  }
  render();

  function save(){
    localStorage.setItem(key('balance'), balance);
    localStorage.setItem(key('adsWatched'), adsWatched);
    localStorage.setItem(key('lastAdTime'), lastAdTime);
    localStorage.setItem(key('today'), JSON.stringify(todayData));
  }

  const statusEl   = document.getElementById('status');
  const cooldownEl = document.getElementById('cooldown');
  const btn        = document.getElementById('watchBtn');

  function setStatus(msg){ statusEl.innerText = msg; }

  // ---------------- COOLDOWN TIMER ----------------
  function tickCooldown(){
    const remain = COOLDOWN_MS - (Date.now() - lastAdTime);
    if (remain > 0){
      btn.disabled = true;
      cooldownEl.innerText = `পরের Ad এর জন্য অপেক্ষা করো: ${Math.ceil(remain/1000)}s`;
    } else {
      btn.disabled = false;
      cooldownEl.innerText = "";
    }
  }
  setInterval(tickCooldown, 500);
  tickCooldown();

  // ---------------- MAIN AD FUNCTION ----------------
  function watchAd(){
    if (Date.now() - lastAdTime < COOLDOWN_MS){
      setStatus("একটু পর আবার চেষ্টা করো।");
      return;
    }
    if (todayData.count >= DAILY_LIMIT){
      setStatus("আজকের জন্য limit শেষ, কাল আবার এসো।");
      return;
    }

    btn.disabled = true;
    setStatus("Ad লোড হচ্ছে...");

    // =====================================================================
    // এখানে RichAds এর REWARDED VIDEO ফাংশন কল করবে।
    // RichAds Publisher Dashboard এ গিয়ে "Show Ad" ফাংশনের নাম দেখে নিবে,
    // সাধারণত এমন কিছু হয় (তোমার আসল ফাংশন নাম দিয়ে বদলে নাও):
    //
    //   window.RichAds.showRewardedVideo({
    //     onComplete: function(){ giveReward(); },
    //     onError: function(){ setStatus("Ad দেখানো গেলো না, আবার চেষ্টা করো।"); btn.disabled=false; }
    //   });
    //
    // যতক্ষণ RichAds এর আসল কোড না বসাচ্ছো, ততক্ষণ টেস্ট করার জন্য
    // নিচের demo simulation ব্যবহার হচ্ছে (৩ সেকেন্ড পর reward দিবে)
    // =====================================================================

    if (window.RichAds && typeof window.RichAds.showRewardedVideo === "function") {
      window.RichAds.showRewardedVideo({
        onComplete: giveReward,
        onError: function(){
          setStatus("Ad দেখানো যায়নি, আবার চেষ্টা করো।");
          btn.disabled = false;
        }
      });
    } else {
      // ---- DEMO MODE (RichAds কোড বসানোর আগে টেস্ট করার জন্য) ----
      setTimeout(giveReward, 3000);
    }
  }

  function giveReward(){
    balance += REWARD_PER_AD;
    adsWatched += 1;
    todayData.count += 1;
    lastAdTime = Date.now();
    save();
    render();
    setStatus(`🎉 +${REWARD_PER_AD.toFixed(2)} coin যোগ হয়েছে!`);
    tickCooldown();

    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }

  function withdraw(){
    if (balance <= 0){
      setStatus("তোমার ব্যালেন্স ০, আগে ad দেখে কামাও।");
      return;
    }
    // এখানে চাইলে নিজের backend/Google Sheet/Bot API তে withdraw request পাঠাতে পারো
    setStatus("তোমার Withdraw request পাঠানো হয়েছে। এডমিন রিভিউ করবে।");
    if (tg?.sendData) {
      tg.sendData(JSON.stringify({action:"withdraw", userId, amount: balance}));
    }
  }
</script>
</body>
</html>
